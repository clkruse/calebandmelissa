<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Caleb & Melissa">
    <meta property="og:description" content="A chronicle of projects and experiments.">
    <meta property="og:image" content="/img/thumbnail-header.jpg">
    <meta property="og:url" content="https://calebandmelissa.com">
    <meta property="og:type" content="website">

    <title>Caleb & Melissa</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <article class="page" id="page">
        
        <!-- Masthead -->
        <header class="timeline-header">
            <h1 class="header-title">Caleb & Melissa</h1>
            <span class="header-subtitle">Projects & Adventures</span>
        </header>

        <!-- Timeline Container -->
        <div class="timeline" id="timeline">
            <div class="timeline-track" id="timeline-track">
                <!-- Entries will be generated here -->
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <span class="footer-item">Est. 2018 · Oakland, California</span>
            <span class="footer-count"><span id="entry-count">00</span> Entries</span>
            <span class="footer-scroll">Scroll to explore</span>
        </footer>

    </article>

    <script>
        // Get configuration from CSS variables (for responsiveness)
        function getConfig() {
            const styles = getComputedStyle(document.documentElement);
            const cardWidth = parseInt(styles.getPropertyValue('--card-width')) || 260;
            return {
                cardWidth: cardWidth,
                cardWidthCompact: Math.round(cardWidth * 0.6), // Running cards are 60% width
                cardHeight: parseInt(styles.getPropertyValue('--card-height')) || 360,
                cardGap: parseInt(styles.getPropertyValue('--card-gap')) || 12,
                yearGap: 48,      // Gap between year sections
                railOffset: parseInt(styles.getPropertyValue('--pin-height')) || 40
            };
        }
        
        let CONFIG = {};

        // Format date for display
        function formatDate(dateStr) {
            const [year, month, day] = dateStr.split('-').map(Number);
            const date = new Date(year, month - 1, day);
            return date.toLocaleDateString('en-US', { 
                month: 'long', 
                day: 'numeric', 
                year: 'numeric' 
            });
        }

        // Create entry HTML
        function createEntryHTML(entry, index) {
            const href = entry.link || '#';
            const isAbove = index % 2 === 0; // Alternate: even = above, odd = below
            
            const pinHTML = isAbove 
                ? '<div class="entry-pin"><span class="pin-line"></span><span class="pin-dot"></span></div>'
                : '<div class="entry-pin"><span class="pin-dot"></span><span class="pin-line"></span></div>';
            
            const cardHTML = `
                <div class="entry-card">
                    <div class="entry-image">
                        <img src="${entry.image}" alt="${entry.imageAlt}">
                        <span class="entry-num">${String(index + 1).padStart(2, '0')}</span>
                        <span class="entry-tag">${entry.tag}</span>
                    </div>
                    <div class="entry-body">
                        <span class="entry-date">${formatDate(entry.date)}</span>
                        <h2 class="entry-title">${entry.title}</h2>
                        <p class="entry-desc">${entry.description}</p>
                        <span class="entry-link">${entry.linkText}</span>
                    </div>
                </div>
            `;
            
            const positionClass = isAbove ? 'entry-above' : 'entry-below';
            
            // Calculate position: brick/stagger pattern
            // Above cards (even index): positions 0, 1, 2, 3... on above row
            // Below cards (odd index): positions 0, 1, 2, 3... on below row, offset by half card width
            const rowIndex = Math.floor(index / 2);
            const cardStep = CONFIG.cardWidth + CONFIG.cardGap;
            const leftOffset = isAbove 
                ? rowIndex * cardStep 
                : rowIndex * cardStep + cardStep / 2;
            
            return `
                <a href="${href}" class="entry ${positionClass}" data-date="${entry.date}" style="left: ${leftOffset}px;">
                    ${isAbove ? cardHTML + pinHTML : pinHTML + cardHTML}
                </a>
            `;
        }

        // Main initialization
        async function init() {
            try {
                // Get responsive config from CSS
                CONFIG = getConfig();
                
                // Fetch entries data
                const response = await fetch('/entries.json');
                const entries = await response.json();
                
                // Sort entries by date (newest first)
                entries.sort((a, b) => {
                    const [ay, am, ad] = a.date.split('-').map(Number);
                    const [by, bm, bd] = b.date.split('-').map(Number);
                    return new Date(by, bm - 1, bd) - new Date(ay, am - 1, ad);
                });
                
                // Update entry count
                document.getElementById('entry-count').textContent = String(entries.length).padStart(2, '0');
                
                // Group entries by year
                const entriesByYear = {};
                entries.forEach((entry, globalIndex) => {
                    const [year] = entry.date.split('-').map(Number);
                    if (!entriesByYear[year]) {
                        entriesByYear[year] = [];
                    }
                    entriesByYear[year].push({ ...entry, globalIndex });
                });
                
                // Get years sorted (newest first)
                const years = Object.keys(entriesByYear).sort((a, b) => b - a);
                
                // Calculate positions and generate HTML
                const track = document.getElementById('timeline-track');
                let html = '';
                let currentX = 0;
                const cardStep = CONFIG.cardWidth + CONFIG.cardGap;
                
                years.forEach((year, yearIndex) => {
                    const yearEntries = entriesByYear[year];
                    const yearStartX = currentX;
                    
                    // Add year label
                    html += `<h2 class="year-label" style="left: ${yearStartX}px;">${year}</h2>`;
                    
                    // Track rightmost card edge for this year
                    let rightmostEdge = 0;
                    
                    // Track positions for above and below rows separately
                    let aboveX = currentX;
                    let belowX = currentX + CONFIG.cardGap; // Slight offset for stagger
                    
                    // Add entries for this year
                    yearEntries.forEach((entry, localIndex) => {
                        const isAbove = localIndex % 2 === 0;
                        const isRunning = entry.tag === 'Running';
                        const cardWidth = isRunning ? CONFIG.cardWidthCompact : CONFIG.cardWidth;
                        
                        let leftOffset;
                        if (isAbove) {
                            leftOffset = aboveX;
                            aboveX += cardWidth + CONFIG.cardGap;
                        } else {
                            leftOffset = belowX;
                            belowX += cardWidth + CONFIG.cardGap;
                        }
                        
                        // Track the rightmost edge of any card
                        rightmostEdge = Math.max(rightmostEdge, leftOffset + cardWidth);
                        
                        html += createEntryHTMLWithPosition(entry, entry.globalIndex, isAbove, leftOffset, cardWidth);
                    });
                    
                    // Add year divider (except after last year)
                    // Position it centered between the last card of this year and first card of next year
                    if (yearIndex < years.length - 1) {
                        const dividerPosition = rightmostEdge + CONFIG.yearGap / 2;
                        html += `<div class="year-divider" style="left: ${dividerPosition}px;"></div>`;
                    }
                    
                    // Move currentX to start of next year section (rightmost edge + gap)
                    currentX = rightmostEdge + CONFIG.yearGap;
                });
                
                // Add the timeline rail with explicit width
                html = `<div class="timeline-rail" style="width: ${currentX}px;"></div>` + html;
                
                track.style.width = currentX + 'px';
                track.innerHTML = html;
                
            } catch (error) {
                console.error('Failed to load entries:', error);
            }
        }
        
        // Create entry HTML with explicit position
        function createEntryHTMLWithPosition(entry, index, isAbove, leftOffset, cardWidth) {
            const href = entry.link || '#';
            const isRunning = entry.tag === 'Running';
            const tagClass = isRunning ? 'entry-compact' : '';
            
            const pinHTML = isAbove 
                ? '<div class="entry-pin"><span class="pin-line"></span><span class="pin-dot"></span></div>'
                : '<div class="entry-pin"><span class="pin-dot"></span><span class="pin-line"></span></div>';
            
            // Compact cards for running: no description, minimal info
            const cardHTML = isRunning ? `
                <div class="entry-card">
                    <div class="entry-image">
                        <img src="${entry.image}" alt="${entry.imageAlt}">
                        <span class="entry-num">${String(index + 1).padStart(2, '0')}</span>
                    </div>
                    <div class="entry-body">
                        <span class="entry-date">${formatDate(entry.date)}</span>
                        <h2 class="entry-title">${entry.title}</h2>
                        <p class="entry-desc">${entry.description}</p>
                    </div>
                </div>
            ` : `
                <div class="entry-card">
                    <div class="entry-image">
                        <img src="${entry.image}" alt="${entry.imageAlt}">
                        <span class="entry-num">${String(index + 1).padStart(2, '0')}</span>
                        <span class="entry-tag">${entry.tag}</span>
                    </div>
                    <div class="entry-body">
                        <span class="entry-date">${formatDate(entry.date)}</span>
                        <h2 class="entry-title">${entry.title}</h2>
                        <p class="entry-desc">${entry.description}</p>
                    </div>
                </div>
            `;
            
            const positionClass = isAbove ? 'entry-above' : 'entry-below';
            
            return `
                <a href="${href}" class="entry ${positionClass} ${tagClass}" data-date="${entry.date}" style="left: ${leftOffset}px; width: ${cardWidth}px;">
                    ${isAbove ? cardHTML + pinHTML : pinHTML + cardHTML}
                </a>
            `;
        }

        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            init();
            
            // Convert vertical scroll to horizontal scroll on timeline (desktop only)
            const timeline = document.getElementById('timeline');
            window.addEventListener('wheel', (e) => {
                // Only intercept scroll on desktop (> 900px viewport)
                if (window.innerWidth > 900 && Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
                    e.preventDefault();
                    timeline.scrollLeft += e.deltaY;
                }
            }, { passive: false });
        });
        
        // Re-render on resize (debounced)
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                init();
            }, 250);
        });
    </script>
</body>

</html>
